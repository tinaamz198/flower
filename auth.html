<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Цветочный Окии - Авторизация</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 80px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .auth-tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; color: #888; }
        .tab-btn.active { color: #47824b; border-bottom: 2px solid #47824b; font-weight: bold; }
        .auth-form { display: none; text-align: left; }
        .auth-form.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: #47824b; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .submit-btn:hover { background: #3b6b3e; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2 style="color: #47824b; margin-bottom: 20px;">🌸 Цветочный Окии</h2>
        
        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Вход</button>
            <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
        </div>

        <form id="login-form" class="auth-form active" action="vendor/login.php" method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="submit-btn">Войти</button>
        </form>

        <form id="register-form" class="auth-form" action="vendor/register.php" method="POST">
            <div class="form-group">
                <label>ФИО</label>
                <input type="text" name="fio" required placeholder="Иванов Иван Иванович">
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="text" name="phone" required placeholder="0707123456">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required placeholder="Минимум 6 символов">
            </div>
            <button type="submit" class="submit-btn">Зарегистрироваться</button>
        </form>
    </div>

    <script>
        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            
            if(type === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }
    </script>
</body>
</html>
